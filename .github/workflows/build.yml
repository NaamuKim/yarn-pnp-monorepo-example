name: Build Check

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build / ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - react-app
          - vue-app
          - angular-app
          - nextjs-app
          - nuxt-app
          - svelte-app
          - solid-app
          - remix-app
          - astro-app
          - qwik-app
          - ts6-holes-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn global cache
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-${{ matrix.app }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-${{ matrix.app }}-
            ${{ runner.os }}-yarn-

      - name: Install dependencies (focus)
        run: yarn workspaces focus @mono/${{ matrix.app }}

      - name: Build
        run: yarn workspace @mono/${{ matrix.app }} build
