name: Build Check

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build / ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - react-app
          - vue-app
          - angular-app
          - nextjs-app
          - nuxt-app
          - svelte-app
          - solid-app
          - remix-app
          - astro-app
          - qwik-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn global cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get globalFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ matrix.app }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-${{ matrix.app }}-
            ${{ runner.os }}-yarn-

      - name: Install dependencies (focus)
        run: yarn workspaces focus @mono/${{ matrix.app }}

      - name: Build
        run: yarn workspace @mono/${{ matrix.app }} build
